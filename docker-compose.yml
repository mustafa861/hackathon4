version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./course_companion.db
      - PHASE=1
    volumes:
      - ./backend:/app
      - sqlite_data:/app/data

  web-app:
    build: ./web-app
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  sqlite_data:
